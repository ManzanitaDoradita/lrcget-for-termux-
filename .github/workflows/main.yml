name: Build LRCGET ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install deps
        run: sudo apt update && sudo apt install -y libgtk-3-dev libayatana-appindicator3-dev curl build-essential

      - name: Build LRCGET release
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: lrcget-arm64
          path: target/aarch64-unknown-linux-gnu/release/lrcget
