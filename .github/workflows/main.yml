name: Build LRCGET ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      # Clona el repo
      - uses: actions/checkout@v3

      # Instala Rust
      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # Instala dependencias necesarias para Tauri headless
      - name: Install deps
        run: sudo apt update && sudo apt install -y libgtk-3-dev libayatana-appindicator3-dev build-essential

      # Entra a src-tauri y compila release
      - name: Build LRCGET release
        run: |
          cd src-tauri
          cargo build --release --target aarch64-unknown-linux-gnu

      # Sube el binario
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: lrcget-arm64
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/lrcget
